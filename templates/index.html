<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GenAI Assistant</title>

<link rel="stylesheet" href="/static/styles.css">

</head>

<body>

<div class="app">

<header class="header">
<h2>🤖 GenAI Assistant</h2>
<p>AI powered knowledge assistant</p>
</header>

<div id="chat-container">

<div id="messages"></div>

<div id="typing" class="typing hidden">

</div>

</div>

<div class="input-area">

<input
id="user-input"
placeholder="Ask something..."

/>

<button id="send-btn">
Send
</button>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
